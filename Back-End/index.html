<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteracyBee – платформа обучения чтению</title>
    <!-- Bootstrap 5 (простой CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f7ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .badge-earned { background-color: #ffd966; color: #5a3e1b; }
        .xp-gradient { background: linear-gradient(135deg, #6fcf97, #27ae60); color: white; }
        .streak-fire { background: #ff9f4a; color: white; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
<div class="container py-4">
    <h1 class="text-center mb-4">📚 LiteracyBee – Демо бэкенда</h1>
    <p class="text-center text-muted">Тестирование API: родители, дети, уроки, упражнения, XP, стрики, бейджи</p>

    <div class="row">
        <!-- Левая колонка: действия -->
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-primary text-white">👨‍👩‍👧 Регистрация / Вход</div>
                <div class="card-body">
                    <div class="mb-2">
                        <input type="email" id="regEmail" class="form-control" placeholder="Email">
                        <input type="text" id="regName" class="form-control mt-2" placeholder="Имя">
                        <input type="password" id="regPassword" class="form-control mt-2" placeholder="Пароль">
                        <button id="registerBtn" class="btn btn-success w-100 mt-2">📝 Зарегистрировать родителя</button>
                    </div>
                    <hr>
                    <div class="mb-2">
                        <input type="email" id="loginEmail" class="form-control" placeholder="Email">
                        <input type="password" id="loginPassword" class="form-control mt-2" placeholder="Пароль">
                        <button id="loginBtn" class="btn btn-primary w-100 mt-2">🔑 Войти как родитель</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-secondary text-white">👧 Создать ребёнка (требуется токен родителя)</div>
                <div class="card-body">
                    <input type="text" id="childName" class="form-control" placeholder="Имя ребёнка">
                    <input type="text" id="childPin" class="form-control mt-2" placeholder="PIN (цифры)">
                    <button id="createChildBtn" class="btn btn-warning w-100 mt-2">➕ Создать ребёнка</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-info text-white">🔐 Вход ребёнка</div>
                <div class="card-body">
                    <input type="text" id="childIdLogin" class="form-control" placeholder="ID ребёнка (UUID)">
                    <input type="text" id="childPinLogin" class="form-control mt-2" placeholder="PIN">
                    <button id="loginChildBtn" class="btn btn-info w-100 mt-2">👶 Войти как ребёнок</button>
                </div>
            </div>
        </div>

        <!-- Правая колонка: уроки и упражнения -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-dark text-white">📖 Уроки и упражнения</div>
                <div class="card-body">
                    <button id="getLessonsBtn" class="btn btn-outline-dark mb-3">📋 Загрузить уроки</button>
                    <div id="lessonsList" class="mb-3" style="max-height: 300px; overflow-y: auto;"></div>

                    <hr>
                    <h6>✏️ Отправить ответ на упражнение</h6>
                    <div class="row">
                        <div class="col-6">
                            <input type="text" id="exerciseId" class="form-control" placeholder="ID упражнения (UUID)">
                        </div>
                        <div class="col-6">
                            <input type="text" id="answerText" class="form-control" placeholder="Ваш ответ">
                        </div>
                    </div>
                    <button id="submitExerciseBtn" class="btn btn-success w-100 mt-2">🚀 Отправить</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header" style="background: #f39c12; color:white;">⭐ Результаты геймификации</div>
                <div class="card-body">
                    <pre id="resultArea" style="font-size: 0.9rem;">Здесь будет ответ сервера...</pre>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Базовый URL бэкенда – подставь свой порт, если отличается
    const API_BASE = 'http://localhost:3000/api';

    // Хранилище токенов
    let parentToken = localStorage.getItem('parentToken') || '';
    let childToken = localStorage.getItem('childToken') || '';

    // Обновляем поле токена в логах (не выводим на UI, но для дебага покажем в консоли)
    console.log('Parent token:', parentToken);
    console.log('Child token:', childToken);

    // Вспомогательная функция для запросов с авторизацией
    async function apiRequest(endpoint, method = 'GET', body = null, useParentToken = true) {
        const token = useParentToken ? parentToken : childToken;
        const headers = {
            'Content-Type': 'application/json',
        };
        if (token) headers['Authorization'] = `Bearer ${token}`;

        const config = {
            method,
            headers,
        };
        if (body) config.body = JSON.stringify(body);

        const response = await fetch(`${API_BASE}${endpoint}`, config);
        let data;
        try { data = await response.json(); } catch(e) { data = { error: 'Ошибка парсинга JSON' }; }
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        return data;
    }

    // Вывод результата в pre
    function showResult(data) {
        document.getElementById('resultArea').innerHTML = JSON.stringify(data, null, 2);
    }

    // ========== Родительские действия ==========
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const name = document.getElementById('regName').value;
        const password = document.getElementById('regPassword').value;
        if (!email || !name || !password) return alert('Заполните все поля');
        try {
            const data = await apiRequest('/auth/register', 'POST', { email, password, name }, false);
            parentToken = data.token;
            localStorage.setItem('parentToken', parentToken);
            showResult({ success: 'Родитель зарегистрирован', user: data.user, token: parentToken.slice(0,20)+'…' });
        } catch(e) { showResult({ error: e.message }); }
    };

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) return alert('Введите email и пароль');
        try {
            const data = await apiRequest('/auth/login', 'POST', { email, password }, false);
            parentToken = data.token;
            localStorage.setItem('parentToken', parentToken);
            showResult({ success: 'Вход выполнен', user: data.user, token: parentToken.slice(0,20)+'…' });
        } catch(e) { showResult({ error: e.message }); }
    };

    // Создание ребёнка (требует родительского токена)
    document.getElementById('createChildBtn').onclick = async () => {
        const name = document.getElementById('childName').value;
        const pin = document.getElementById('childPin').value;
        if (!name || !pin) return alert('Введите имя и PIN ребёнка');
        try {
            const data = await apiRequest('/auth/children', 'POST', { name, pin }, true);
            showResult({ success: 'Ребёнок создан', child: data });
            // Заполним поле childIdLogin для удобства
            document.getElementById('childIdLogin').value = data.id;
        } catch(e) { showResult({ error: e.message }); }
    };

    // Логин ребёнка
    document.getElementById('loginChildBtn').onclick = async () => {
        const childId = document.getElementById('childIdLogin').value;
        const pin = document.getElementById('childPinLogin').value;
        if (!childId || !pin) return alert('Введите ID ребёнка и PIN');
        try {
            const data = await apiRequest('/auth/child/login', 'POST', { childId, pin }, false);
            childToken = data.token;
            localStorage.setItem('childToken', childToken);
            showResult({ success: 'Ребёнок вошёл', user: data.user, token: childToken.slice(0,20)+'…' });
        } catch(e) { showResult({ error: e.message }); }
    };

    // Получить уроки (с любой ролью, но нужен токен)
    document.getElementById('getLessonsBtn').onclick = async () => {
        try {
            let token = parentToken || childToken;
            if (!token) throw new Error('Нет токена. Сначала войдите.');
            const response = await fetch(`${API_BASE}/lessons`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!response.ok) throw new Error(await response.text());
            const lessons = await response.json();
            const html = lessons.map(l => `<div class="border rounded p-2 mb-2"><b>${l.title}</b><br><small>${l.description}</small><br><span class="badge bg-secondary">Порядок: ${l.order_index}</span> XP:${l.xp_reward}</div>`).join('');
            document.getElementById('lessonsList').innerHTML = html || '<p>Нет уроков. Добавьте через SQL.</p>';
            showResult({ lessons: lessons.map(l => ({ id: l.id, title: l.title })) });
        } catch(e) { showResult({ error: e.message }); }
    };

    // Отправить ответ на упражнение (требует токен ребёнка)
    document.getElementById('submitExerciseBtn').onclick = async () => {
        const exerciseId = document.getElementById('exerciseId').value;
        const answer = document.getElementById('answerText').value;
        if (!exerciseId || !answer) return alert('Введите ID упражнения и ответ');

        // Нужен childId – можно было бы взять из глобального состояния, но для простоты спросим
        let childId = prompt('Введите ID ребёнка (тот, который получили при создании или из БД):');
        if (!childId) return;
        try {
            if (!childToken) throw new Error('Нет токена ребёнка. Сначала войдите как ребёнок.');
            const data = await apiRequest(`/lessons/child/${childId}/exercise/${exerciseId}`, 'POST', { answer }, false);
            showResult(data);
            if (data.lessonCompleted) alert(`🎉 Урок завершён! Новый прогресс: ${data.newScore}%`);
        } catch(e) { showResult({ error: e.message }); }
    };
</script>
</body>
</html>
